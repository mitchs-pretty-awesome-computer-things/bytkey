name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  quality:
    name: Lint, format, type check, and build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run fmt:check

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build
