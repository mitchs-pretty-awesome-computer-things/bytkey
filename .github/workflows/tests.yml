name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test-matrix:
    name: Cross-runtime test matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun, deno]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Test on Node
        if: matrix.runtime == 'node'
        run: npm install && npm run test

      - name: Test on Bun
        if: matrix.runtime == 'bun'
        run: bun install --frozen-lockfile && bun run test

      - name: Test on Deno
        if: matrix.runtime == 'deno'
        run: deno run -A npm:vitest run
